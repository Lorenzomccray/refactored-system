source_pack:
  id: universal_ai_source_pack
  name: Universal AI Source Pack
  version: 1.0.0
  description: Unified source registry for public, zero-login AI and MCP knowledge
    bases. Optimized for source tabs, crawlers, RAG seed registries, and agent-accessible
    documentation routing.
  default_ingestion_order:
  - llms-full.txt
  - llms.txt
  - markdown
  - openapi/json/yaml/schema
  - structured_html
  dedupe_policy:
    prefer:
    - markdown
    - openapi/json/yaml
    - llms-full derived content
    - clean html
    - raw html
    by:
    - source_id
    - canonical_url
    - ingestion_url
    - content_hash
  namespace_priority:
  - standards/mcp
  - providers/openai
  - providers/anthropic
  - agents/langchain
  - agents/pydantic_ai
  - rag/llamaindex
  - rag/qdrant
  - rag/weaviate
  - observability/langfuse
  - serving/vllm
  - frameworks/fastmcp
  - platforms/openai/apps_sdk
  - community/mcp
sources:
- id: langchain_docs
  name: LangChain / LangGraph / LangSmith docs
  category: agent_orchestration
  primary_url: https://docs.langchain.com
  ingestion_urls:
  - https://docs.langchain.com/llms.txt
  - https://docs.langchain.com/mcp
  description: 'Comprehensive documentation for LangChain and its related projects

    (LangGraph and LangSmith).  It covers agent orchestration,

    memory, runtime, observability and deployment.  The docs publish an

    `llms.txt` index and a docs MCP server for live retrieval, enabling

    efficient ingestion of the content.

    '
  trust_tier: A
  namespace: agents/langchain
  source_kind: llms_txt
  enabled: true
  priority: 100
- id: pydantic_ai_docs
  name: Pydantic AI docs
  category: agent_framework
  primary_url: https://pydantic.dev/docs/ai
  ingestion_urls:
  - https://pydantic.dev/docs/ai/llms-full.txt
  - https://pydantic.dev/docs/ai/overview/
  - https://pydantic.dev/docs/ai/mcp/overview/
  description: 'Documentation for Pydantic AI, a framework that brings strict type

    models and validation to agent workflows.  It includes detailed

    guidance on models, schemas, agents and MCP integration.  A

    `llms-full.txt` index enumerates the pages, and the docs emphasize

    structured outputs and evaluation.

    '
  trust_tier: A
  namespace: agents/pydantic_ai
  source_kind: llms_txt
  enabled: true
  priority: 100
- id: fastmcp_docs
  name: FastMCP documentation
  category: framework_docs
  trust_tier: A
  primary_url: https://gofastmcp.com/getting-started/welcome
  ingestion_urls:
  - https://gofastmcp.com/llms.txt
  - https://gofastmcp.com/llms-full.txt
  - https://gofastmcp.com/getting-started/welcome
  - https://gofastmcp.com/getting-started/welcome.md
  description: 'Primary framework docs for FastMCP, with llms indexes and markdown
    page

    access. Best practical framework source for building MCP tools,

    resources, prompts, and clients.

    '
  namespace: frameworks/fastmcp
  enabled: true
  priority: 100
  source_kind: llms_txt
- id: fastmcp_tools_resources
  name: FastMCP tools and resources docs
  category: framework_reference
  trust_tier: A
  primary_url: https://gofastmcp.com/servers/tools
  ingestion_urls:
  - https://gofastmcp.com/servers/tools
  - https://gofastmcp.com/v2/servers/resources
  - https://gofastmcp.com/servers/context
  description: 'Focused FastMCP references for tools, resources, and context-handling.

    Useful for precise server capability implementation.

    '
  namespace: frameworks/fastmcp
  enabled: true
  priority: 100
  source_kind: html_docs
- id: langfuse_docs
  name: Langfuse docs
  category: observability_evals
  primary_url: https://langfuse.com/docs
  ingestion_urls:
  - https://langfuse.com/llms.txt
  - https://langfuse.com/api/mcp
  - https://langfuse.com/docs
  description: 'Documentation for Langfuse, a platform for observability, tracing
    and

    evaluation of LLM applications.  The docs feature an `llms.txt`

    manifest and expose a docs MCP endpoint.  They cover topics such as

    tracing, cost tracking, dataset management and self‑hosting.

    '
  trust_tier: A
  namespace: observability/langfuse
  source_kind: llms_txt
  enabled: true
  priority: 100
- id: openai_apps_sdk_mcp
  name: OpenAI Apps SDK MCP concepts
  category: host_integration
  trust_tier: A
  primary_url: https://developers.openai.com/apps-sdk/concepts/mcp-server
