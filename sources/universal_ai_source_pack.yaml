- id: openai_api_docs
  name: OpenAI API docs
  category: provider_api
  primary_url: https://developers.openai.com/api/docs
  ingestion_urls:
  - https://developers.openai.com/api/docs/llms.txt
  - https://developers.openai.com/api/docs/llms-full.txt
  description: 'Official developer documentation for the OpenAI API.  These docs cover

    model invocation, tool and function calling, files, assistants and

    workflows.  The OpenAI team publishes machine‑readable index files

    (`llms.txt` and `llms-full.txt`) that list every page and link to

    corresponding Markdown representations, making the content easy to crawl

    and ingest.

    '
  trust_tier: A
  namespace: providers/openai
  source_kind: llms_txt
  enabled: true
  priority: 100
