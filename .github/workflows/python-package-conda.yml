name: Python Package using Conda

on:
  push:
    paths-ignore:
      - 'docs/**'
      - 'sources/**'
      - '**/*.md'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Add conda to system path if available
        shell: bash
        run: |
          if [ -n "${CONDA:-}" ] && [ -d "$CONDA/bin" ]; then
            echo "$CONDA/bin" >> "$GITHUB_PATH"
          else
            echo "Conda not available on runner; continuing without it."
          fi

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f environment.yml ] && command -v conda >/dev/null 2>&1; then
            echo "Using conda environment.yml"
            conda env update --file environment.yml --name base
          elif [ -f requirements.txt ]; then
            echo "Using pip requirements.txt"
            python -m pip install -r requirements.txt
          else
            echo "No environment.yml or requirements.txt found; skipping project dependency install."
          fi

      - name: Lint with flake8
        shell: bash
        run: |
          python -m pip install flake8
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test with pytest
        shell: bash
        run: |
          python -m pip install pytest
          pytest
